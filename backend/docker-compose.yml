services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: growth_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    ports:
      - "16379:6379"

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "15050:80"
    depends_on:
      - postgres

  app:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/growth_db
      REDIS_URL: redis://redis:6379
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
      - ./ui:/app/ui
      - ./run_worker.py:/app/run_worker.py
      - ./run_linkedin_worker.py:/app/run_linkedin_worker.py
      - ./cookies:/app/cookies
    env_file:
      - .env


  

  ngrok:
    image: ngrok/ngrok:latest
    command: http app:8000
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    ports:
      - "4040:4040"
    depends_on:
      - app

  model-gateway:
    image: maximhq/bifrost:latest
    ports:
      - "4000:4000"
    environment:
      APP_PORT: 4000
      BIFROST_OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      BIFROST_PROMETHEUS_PORT: 9090

volumes:
  postgres_data: